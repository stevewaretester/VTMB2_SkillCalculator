<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#a860c0"/>
      <stop offset="100%" stop-color="#1e0a2a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Diamond background -->
  <polygon points="50,4 96,50 50,96 4,50" fill="url(#bg)"/>
  <!-- Diamond edge highlight -->
  <polygon points="50,4 96,50 50,96 4,50" fill="none" stroke="#733F83" stroke-width="2.5" opacity="0.9"/>
  <polygon points="50,7 93,50 50,93 7,50" fill="none" stroke="rgba(200,120,255,0.3)" stroke-width="1"/>
  <!-- Bottle silhouette -->
  <g fill="white" opacity="0.12">
    <rect x="44" y="27" width="12" height="3" rx="1.5"/>
    <path d="M43,30 L43,36 Q32,40 31,56 Q30,72 50,74 Q70,72 69,56 Q68,40 57,36 L57,30 Z"/>
  </g>
  <!-- Bottle neck outline -->
  <rect x="44" y="27" width="12" height="9" rx="2" fill="none" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <!-- Shield icon -->
  <g filter="url(#glow)">
    <path d="M50,44 L64,49 L64,60 C64,67 57,73 50,75 C43,73 36,67 36,60 L36,49 Z"
          fill="white" opacity="0.92"/>
    <!-- Shield inner highlight -->
    <path d="M50,47 L61,51 L61,60 C61,65.5 55.5,70.5 50,72"
          fill="none" stroke="rgba(200,120,255,0.5)" stroke-width="1.5"/>
  </g>
</svg>

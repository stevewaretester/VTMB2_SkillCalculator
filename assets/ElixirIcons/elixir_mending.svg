<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#0099c0"/>
      <stop offset="100%" stop-color="#001e2a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Diamond background -->
  <polygon points="50,4 96,50 50,96 4,50" fill="url(#bg)"/>
  <!-- Diamond edge highlight -->
  <polygon points="50,4 96,50 50,96 4,50" fill="none" stroke="#006483" stroke-width="2.5" opacity="0.9"/>
  <polygon points="50,7 93,50 50,93 7,50" fill="none" stroke="rgba(100,220,255,0.3)" stroke-width="1"/>
  <!-- Bottle silhouette -->
  <g fill="white" opacity="0.12">
    <rect x="44" y="27" width="12" height="3" rx="1.5"/>
    <path d="M43,30 L43,36 Q32,40 31,56 Q30,72 50,74 Q70,72 69,56 Q68,40 57,36 L57,30 Z"/>
  </g>
  <!-- Bottle neck outline -->
  <rect x="44" y="27" width="12" height="9" rx="2" fill="none" stroke="white" stroke-width="1.2" opacity="0.35"/>
  <!-- Heart icon -->
  <g filter="url(#glow)">
    <path d="M50,71 C50,71 35,59 35,52 C35,46 39.5,42 44,44 C46.5,45 49,48 50,50 C51,48 53.5,45 56,44 C60.5,42 65,46 65,52 C65,59 50,71 50,71Z"
          fill="white" opacity="0.92"/>
    <!-- Highlight -->
    <ellipse cx="43" cy="50" rx="3" ry="4" fill="white" opacity="0.35"/>
  </g>
</svg>
